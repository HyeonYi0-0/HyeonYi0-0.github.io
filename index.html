<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">
    <title>Momentum App</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h2 id="clock">00:00:00</h2>
        <div>
          <div id="weather">
            <span>Seoul</span>
            <span>25'C</span>
          </div>          
        </div>
      </header>
      <div id="visual">
        <h1 class="hidden">Log in</h1>
        <form class="hidden" id="login-form">
          <input placeholder="Username" type="text" class="inputs" required="" maxlength="15"/>
        </form>

        <h1 class="hidden" id="greeting"></h1>
        <form class="hidden" id="todo-form">
          <input placeholder="Write a To Do" type="text" class="inputs" required=""/>
        </form>
        <ul class="hidden" id="todo-list"></ul>
      </div>
    </div>

    <script src="js/greetings.js"></script>
    <script src="js/todo.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/background.js"></script>
  </body>
</html>
